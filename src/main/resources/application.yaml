server:
  port: 8080

spring:
  application:
    name: catalog

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis
    redis:
      time-to-live: 300000    # 5 minutes in milliseconds
      cache-null-values: false

  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_DB}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    baseline-on-migrate: true
    schemas: catalog

  jpa:
    properties:
      hibernate:
        default_schema: catalog

management:
  endpoints:
    web:
      base-path: /catalog/actuator
      exposure:
        include: ['prometheus']
